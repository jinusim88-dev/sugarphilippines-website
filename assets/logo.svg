<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <!-- Warm sugar gradient -->
    <linearGradient id="sugarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="50%" style="stop-color:#D4831A"/>
      <stop offset="100%" style="stop-color:#B8690E"/>
    </linearGradient>
    
    <!-- Sun ray gradient -->
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
    </linearGradient>
    
    <!-- Accent green for cane leaves -->
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    
    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle (optional decorative) -->
  <circle cx="200" cy="120" r="70" fill="none" stroke="url(#sunGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Philippine Sun Rays (8 rays radiating from center) -->
  <g transform="translate(200, 120)" opacity="0.9">
    <polygon points="0,-55 4,-30 -4,-30" fill="url(#sunGradient)"/>
    <polygon points="0,-55 4,-30 -4,-30" fill="url(#sunGradient)" transform="rotate(45)"/>
    <polygon points="0,-55 4,-30 -4,-30" fill="url(#sunGradient)" transform="rotate(90)"/>
    <polygon points="0,-55 4,-30 -4,-30" fill="url(#sunGradient)" transform="rotate(135)"/>
    <polygon points="0,-55 4,-30 -4,-30" fill="url(#sunGradient)" transform="rotate(180)"/>
    <polygon points="0,-55 4,-30 -4,-30" fill="url(#sunGradient)" transform="rotate(225)"/>
    <polygon points="0,-55 4,-30 -4,-30" fill="url(#sunGradient)" transform="rotate(270)"/>
    <polygon points="0,-55 4,-30 -4,-30" fill="url(#sunGradient)" transform="rotate(315)"/>
  </g>
  
  <!-- Central sun circle -->
  <circle cx="200" cy="120" r="28" fill="url(#sunGradient)" filter="url(#softShadow)"/>
  
  <!-- Sugar crystals inside sun -->
  <g transform="translate(200, 120)">
    <rect x="-8" y="-12" width="10" height="10" rx="1" fill="#FFF9E6" opacity="0.9" transform="rotate(15)"/>
    <rect x="2" y="-5" width="8" height="8" rx="1" fill="#FFF5D6" opacity="0.85" transform="rotate(-10)"/>
    <rect x="-5" y="2" width="7" height="7" rx="1" fill="#FFFBF0" opacity="0.8" transform="rotate(25)"/>
  </g>
  
  <!-- Sugarcane stalks (left) -->
  <g filter="url(#softShadow)">
    <rect x="115" y="85" width="12" height="70" rx="4" fill="url(#sugarGradient)"/>
    <line x1="115" y1="100" x2="127" y2="100" stroke="#C47A15" stroke-width="1.5"/>
    <line x1="115" y1="120" x2="127" y2="120" stroke="#C47A15" stroke-width="1.5"/>
    <line x1="115" y1="140" x2="127" y2="140" stroke="#C47A15" stroke-width="1.5"/>
    <!-- Leaf -->
    <path d="M127 90 Q145 75 155 85 Q145 90 127 95" fill="url(#leafGradient)"/>
    <path d="M115 105 Q95 95 90 105 Q100 110 115 110" fill="url(#leafGradient)"/>
  </g>
  
  <!-- Sugarcane stalks (right) -->
  <g filter="url(#softShadow)">
    <rect x="273" y="85" width="12" height="70" rx="4" fill="url(#sugarGradient)"/>
    <line x1="273" y1="100" x2="285" y2="100" stroke="#C47A15" stroke-width="1.5"/>
    <line x1="273" y1="120" x2="285" y2="120" stroke="#C47A15" stroke-width="1.5"/>
    <line x1="273" y1="140" x2="285" y2="140" stroke="#C47A15" stroke-width="1.5"/>
    <!-- Leaf -->
    <path d="M273 90 Q255 75 245 85 Q255 90 273 95" fill="url(#leafGradient)"/>
    <path d="M285 105 Q305 95 310 105 Q300 110 285 110" fill="url(#leafGradient)"/>
  </g>
  
  <!-- Main Text: SUGAR -->
  <text x="200" y="210" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="52" 
        font-weight="bold" 
        fill="url(#sugarGradient)" 
        text-anchor="middle"
        letter-spacing="8"
        filter="url(#softShadow)">
    SUGAR
  </text>
  
  <!-- Subtitle: PHILIPPINES -->
  <text x="200" y="245" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="22" 
        fill="#5D4E37" 
        text-anchor="middle"
        letter-spacing="12"
        font-weight="normal">
    PHILIPPINES
  </text>
  
  <!-- Decorative underline -->
  <line x1="120" y1="258" x2="280" y2="258" stroke="url(#sugarGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Small decorative dots -->
  <circle cx="115" cy="258" r="3" fill="url(#sunGradient)"/>
  <circle cx="285" cy="258" r="3" fill="url(#sunGradient)"/>
</svg>